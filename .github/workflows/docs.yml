name: Documentation

on:
  push:
    branches: [master]
    paths:
      - "AGENTS.md"
      - "PLAN.md"
      - "STATE.md"
      - "DECISIONS.md"
      - "README.md"
      - "compat/**"
      - "docs/**"
      - "src/version.lisp"
      - "tests/conformance/exec-passlist.txt"
      - "tests/conformance/exec-gaps.tsv"
      - "scripts/public-claims-check.sh"
      - "scripts/compat.sh"
      - "scripts/compat-validate.awk"
      - "scripts/compat-render.awk"
      - "scripts/test-compat-tools.sh"
      - "scripts/roadmap.sh"
      - "scripts/test-installer.sh"
      - "site/**"
      - ".github/workflows/docs.yml"
      - ".github/workflows/compat.yml"
  pull_request:
    paths:
      - "AGENTS.md"
      - "PLAN.md"
      - "STATE.md"
      - "DECISIONS.md"
      - "README.md"
      - "compat/**"
      - "docs/**"
      - "src/version.lisp"
      - "tests/conformance/exec-passlist.txt"
      - "tests/conformance/exec-gaps.tsv"
      - "scripts/public-claims-check.sh"
      - "scripts/compat.sh"
      - "scripts/compat-validate.awk"
      - "scripts/compat-render.awk"
      - "scripts/test-compat-tools.sh"
      - "scripts/roadmap.sh"
      - "scripts/test-installer.sh"
      - "site/**"
      - ".github/workflows/docs.yml"
      - ".github/workflows/compat.yml"

permissions:
  contents: read
  issues: read

jobs:
  claims:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - run: sh scripts/public-claims-check.sh
      - run: make test-compat-tools
      - name: Verify canonical live roadmap issues
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          ROADMAP_REPO: ${{ github.repository }}
        run: make roadmap-verify-live
