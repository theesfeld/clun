name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  claims:
    name: Verify published claims
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify immutable annotated tag on master
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git cat-file -t "refs/tags/$GITHUB_REF_NAME")" = tag
          tagged_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          git fetch --no-tags origin master
          master_commit="$(git rev-parse origin/master)"
          sh scripts/release/verify-tagged-master.sh "$tagged_commit" "$master_commit"
          master_runs="$RUNNER_TEMP/exact-master-runs.tsv"
          gh api --paginate \
            "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$tagged_commit&event=push&per_page=100" \
            --jq '.workflow_runs[] | [.id, .name, .path, .head_sha, .head_branch, .event, .status, .conclusion] | @tsv' \
            > "$master_runs"
          sh scripts/release/verify-exact-sha-runs.sh "$master_runs" "$tagged_commit"
          release_json="$RUNNER_TEMP/existing-release.json"
          release_error="$RUNNER_TEMP/existing-release.error"
          if gh api \
            "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" \
            >"$release_json" 2>"$release_error"; then
            test "$(jq -r .tag_name "$release_json")" = "$GITHUB_REF_NAME"
            if test "$(jq -r .draft "$release_json")" = true; then
              echo "unpublished draft $GITHUB_REF_NAME exists; deleting a GitHub Release requires human escalation" >&2
              exit 1
            fi
            CLUN_RELEASE_REPO="$GITHUB_REPOSITORY" \
            CLUN_RELEASE_EXPECTED_SHA="$tagged_commit" \
            CLUN_RELEASE_WAIT_SECONDS=0 \
              sh scripts/release-live-check.sh
            echo "existing immutable release $GITHUB_REF_NAME verified; rerun remains read-only"
          elif ! grep -Eq 'HTTP[[:space:]]+404|\(HTTP 404\)' "$release_error"; then
            cat "$release_error" >&2
            echo "could not determine whether release $GITHUB_REF_NAME already exists" >&2
            exit 1
          fi
      - run: sh scripts/public-claims-check.sh
      - run: make test-release-workflow
      - name: Verify canonical live roadmap issues
        env:
          GH_TOKEN: ${{ github.token }}
          ROADMAP_REPO: ${{ github.repository }}
        run: make roadmap-verify-live

  build:
    name: Build ${{ matrix.target }}
    needs: claims
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-24.04
            expected_machine: x86_64
          - target: linux-arm64
            runner: ubuntu-22.04-arm
            expected_machine: aarch64
          - target: darwin-x64
            runner: macos-15-intel
            expected_machine: x86_64
          - target: darwin-arm64
            runner: macos-15
            expected_machine: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Check runner architecture
        shell: bash
        run: test "$(uname -m)" = "${{ matrix.expected_machine }}"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bzip2 curl make openssl sbcl zstd libzstd-dev

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # GitHub's macOS image can carry an unrelated, untrusted aws/tap.
          # Remove it from this ephemeral runner instead of trusting third-party
          # formulae or letting it destabilize otherwise unrelated brew calls.
          taps="$(brew tap)"
          if printf '%s\n' "$taps" | grep -Fxq 'aws/tap'; then
            brew untap --force aws/tap
          fi
          brew list sbcl >/dev/null 2>&1 || brew install sbcl
          brew list zstd >/dev/null 2>&1 || brew install zstd
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
          echo "$(brew --prefix openssl@3)/bin" >> "$GITHUB_PATH"

      - name: Install pinned SBCL 2.6.4 binary
        if: matrix.target == 'linux-x64'
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output "$RUNNER_TEMP/sbcl-binary.tar.bz2" \
            https://downloads.sourceforge.net/project/sbcl/sbcl/2.6.4/sbcl-2.6.4-x86-64-linux-binary.tar.bz2
          test "$(shasum -a 256 "$RUNNER_TEMP/sbcl-binary.tar.bz2" | awk '{print $1}')" = \
            "466933f9b4f403b6a49b2a7cc755fdd5d827c3b354aa3c8c0d96697e5da1e9fc"
          tar -xjf "$RUNNER_TEMP/sbcl-binary.tar.bz2" -C "$RUNNER_TEMP"
          cd "$RUNNER_TEMP/sbcl-2.6.4-x86-64-linux"
          unset SBCL_HOME
          INSTALL_ROOT="$RUNNER_TEMP/sbcl-2.6.4-installed" sh install.sh
          "$RUNNER_TEMP/sbcl-2.6.4-installed/bin/sbcl" --version | grep -F "SBCL 2.6.4"
          echo "SBCL_HOME=$RUNNER_TEMP/sbcl-2.6.4-installed/lib/sbcl" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/sbcl-2.6.4-installed/bin" >> "$GITHUB_PATH"

      - name: Build pinned SBCL 2.6.4 from source
        if: matrix.target != 'linux-x64'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            export MACOSX_DEPLOYMENT_TARGET=13.0
            echo "MACOSX_DEPLOYMENT_TARGET=13.0" >> "$GITHUB_ENV"
          fi
          curl --fail --location --retry 3 \
            --output "$RUNNER_TEMP/sbcl-source.tar.bz2" \
            https://downloads.sourceforge.net/project/sbcl/sbcl/2.6.4/sbcl-2.6.4-source.tar.bz2
          test "$(shasum -a 256 "$RUNNER_TEMP/sbcl-source.tar.bz2" | awk '{print $1}')" = \
            "3ba53e654b60feb7c4f50466199d6d5260f2661c711ba22d4b770b655400d57b"
          tar -xjf "$RUNNER_TEMP/sbcl-source.tar.bz2" -C "$RUNNER_TEMP"
          cd "$RUNNER_TEMP/sbcl-2.6.4"
          sh make.sh --prefix="$RUNNER_TEMP/sbcl-2.6.4-installed"
          sh install.sh
          "$RUNNER_TEMP/sbcl-2.6.4-installed/bin/sbcl" --version | grep -F "SBCL 2.6.4"
          echo "$RUNNER_TEMP/sbcl-2.6.4-installed/bin" >> "$GITHUB_PATH"

      - name: Report toolchain
        run: test "$(sbcl --version)" = "SBCL 2.6.4"

      - name: Build
        run: make build

      - name: Run compatibility evidence
        env:
          CLUN_COMPAT_TARGET: ${{ matrix.target }}
        run: sh scripts/compat.sh run all

      - name: Smoke test
        run: |
          test "$(./build/clun --version)" = "clun ${GITHUB_REF_NAME#v}"
          ./build/clun -p '6 * 7'

      - name: Test (shared-runner performance gates excluded)
        env:
          CLUN_SKIP_PERFORMANCE_TESTS: "1"
        run: make test

      - name: Verify WebPKI, TLS security policy, and OpenSSL interop
        run: make test-tls

      - name: Verify live public npm add/install and offline reinstall
        run: sh scripts/smoke-npm.sh

      - name: Verify live test262 inventory matches published claims
        if: matrix.target == 'linux-x64'
        run: make conformance-buckets-verify

      - name: Test cryptography
        run: make test-crypto

      - name: Verify purity
        run: make purity

      - name: Package native release
        shell: bash
        run: |
          chmod +x scripts/release/package.sh
          scripts/release/package.sh \
            "${{ matrix.target }}" \
            "${GITHUB_REF_NAME}" \
            "$RUNNER_TEMP/dist"

      - name: Verify packaged binary
        shell: bash
        run: |
          mkdir "$RUNNER_TEMP/verify"
          tar -xzf "$RUNNER_TEMP/dist/clun-${{ matrix.target }}.tar.gz" \
            -C "$RUNNER_TEMP/verify"
          "$RUNNER_TEMP/verify/clun-${{ matrix.target }}/bin/clun" --version

      - name: Verify shell installer
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$RUNNER_TEMP/dist" && sha256sum clun-${{ matrix.target }}.tar.gz > checksums.txt)
          else
            (cd "$RUNNER_TEMP/dist" && shasum -a 256 clun-${{ matrix.target }}.tar.gz > checksums.txt)
          fi
          HOME="$RUNNER_TEMP/installer-home" \
          CLUN_DOWNLOAD_BASE="file://$RUNNER_TEMP/dist" \
          INSTALL_VERSION="${GITHUB_REF_NAME}" \
          INSTALL_DIR="$RUNNER_TEMP/installer-bin" \
          ADD_PATH=0 \
            sh site/install
          test -L "$RUNNER_TEMP/installer-bin/clun"
          PATH="$RUNNER_TEMP/installer-bin:$PATH"
          export PATH
          test "$(clun --version)" = \
            "clun ${GITHUB_REF_NAME#v}"
          bundle="$RUNNER_TEMP/installer-home/.local/share/clun/releases/${GITHUB_REF_NAME#v}/${{ matrix.target }}"
          test -f "$bundle/VERSION"
          if test "$RUNNER_OS" = Linux; then
            test -f "$bundle/lib/LOADER"
            test -x "$bundle/libexec/clun"
          fi

      - name: Verify updater with the real packaged bundle
        shell: bash
        run: |
          sh scripts/test-packaged-updater.sh \
            "$RUNNER_TEMP/dist/clun-${{ matrix.target }}.tar.gz" \
            "$GITHUB_REF_NAME" \
            "${{ matrix.target }}"

      - uses: actions/upload-artifact@v7
        with:
          name: clun-${{ matrix.target }}
          path: ${{ runner.temp }}/dist/clun-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    # Cross-tag builds may overlap, but publication and latest selection are serialized.
    concurrency:
      group: release-publication
      cancel-in-progress: false
    permissions:
      contents: write
      issues: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum clun-*.tar.gz > checksums.txt

      - name: Verify staged release assets before publication
        run: sh scripts/release/verify-assets.sh dist

      - name: Reverify canonical issues immediately before publishing
        env:
          GH_TOKEN: ${{ github.token }}
          ROADMAP_REPO: ${{ github.repository }}
        run: make roadmap-verify-live

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          release_json="$RUNNER_TEMP/existing-release.json"
          release_error="$RUNNER_TEMP/existing-release.error"
          if gh api \
            "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" \
            >"$release_json" 2>"$release_error"; then
            test "$(jq -r .tag_name "$release_json")" = "$GITHUB_REF_NAME"
            if test "$(jq -r .draft "$release_json")" = true; then
              echo "unpublished draft $GITHUB_REF_NAME exists; deleting a GitHub Release requires human escalation" >&2
              exit 1
            fi
            tagged_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
            CLUN_RELEASE_REPO="$GITHUB_REPOSITORY" \
            CLUN_RELEASE_EXPECTED_SHA="$tagged_commit" \
            CLUN_RELEASE_WAIT_SECONDS=0 \
              sh scripts/release-live-check.sh
            existing_assets="$RUNNER_TEMP/existing-release-assets"
            mkdir "$existing_assets"
            gh release download "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --dir "$existing_assets"
            sh scripts/release/verify-assets.sh "$existing_assets"
            echo "existing immutable release $GITHUB_REF_NAME and checksums verified; no mutation needed"
            exit 0
          elif ! grep -Eq 'HTTP[[:space:]]+404|\(HTTP 404\)' "$release_error"; then
            cat "$release_error" >&2
            echo "could not determine whether release $GITHUB_REF_NAME already exists" >&2
            exit 1
          fi

          release_flags=(--prerelease=false --latest=false)
          tag_without_build="${GITHUB_REF_NAME%%+*}"
          case "$tag_without_build" in
            v*-*)
              release_flags=(--prerelease --latest=false)
              ;;
            *)
              export LC_ALL=C
              stable_pattern='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
              [[ "$GITHUB_REF_NAME" =~ $stable_pattern ]] || {
                echo "stable release tag is not strict SemVer: $GITHUB_REF_NAME" >&2
                exit 1
              }

              compare_uint() {
                local left=$1
                local right=$2
                if (( ${#left} < ${#right} )); then
                  printf '%s\n' -1
                elif (( ${#left} > ${#right} )); then
                  printf '%s\n' 1
                elif [[ "$left" < "$right" ]]; then
                  printf '%s\n' -1
                elif [[ "$left" > "$right" ]]; then
                  printf '%s\n' 1
                else
                  printf '%s\n' 0
                fi
              }

              version_compare() {
                local left_core right_core comparison index
                local -a left_parts right_parts
                left_core=${1#v}
                right_core=${2#v}
                left_core=${left_core%%+*}
                right_core=${right_core%%+*}
                IFS=. read -r -a left_parts <<<"$left_core"
                IFS=. read -r -a right_parts <<<"$right_core"
                for index in 0 1 2; do
                  comparison="$(compare_uint "${left_parts[$index]}" "${right_parts[$index]}")"
                  if test "$comparison" -ne 0; then
                    printf '%s\n' "$comparison"
                    return
                  fi
                done
                printf '%s\n' 0
              }

              # Never let workflow completion order override stable SemVer precedence.
              stable_tags="$RUNNER_TEMP/published-stable-tags"
              gh api --paginate \
                "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
                --jq '.[] | select(.draft == false and .prerelease == false) | .tag_name' \
                >"$stable_tags"
              highest_stable=
              while IFS= read -r stable_tag; do
                test -n "$stable_tag" || continue
                [[ "$stable_tag" =~ $stable_pattern ]] || {
                  echo "published stable release tag is not strict SemVer: $stable_tag" >&2
                  exit 1
                }
                if test -z "$highest_stable" ||
                   test "$(version_compare "$stable_tag" "$highest_stable")" -gt 0; then
                  highest_stable=$stable_tag
                fi
              done <"$stable_tags"

              mark_latest=false
              if test -z "$highest_stable" ||
                 test "$(version_compare "$GITHUB_REF_NAME" "$highest_stable")" -gt 0; then
                mark_latest=true
              fi
              if test "$mark_latest" = true; then
                release_flags=(--prerelease=false --latest)
              fi
              ;;
          esac

          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            "${release_flags[@]}" \
            --generate-notes \
            --notes-file docs/releases/current.md \
            --title "Clun $GITHUB_REF_NAME" \
            dist/clun-*.tar.gz dist/checksums.txt

          test "$(gh release view "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --json isImmutable \
            --jq .isImmutable)" = true || {
            echo "published release $GITHUB_REF_NAME is not immutable" >&2
            exit 1
          }

          tagged_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          CLUN_RELEASE_REPO="$GITHUB_REPOSITORY" \
          CLUN_RELEASE_EXPECTED_SHA="$tagged_commit" \
          CLUN_RELEASE_WAIT_SECONDS=0 \
            sh scripts/release-live-check.sh
          published_assets="$RUNNER_TEMP/published-release-assets"
          mkdir "$published_assets"
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$published_assets"
          sh scripts/release/verify-assets.sh "$published_assets"
          echo "fresh immutable release $GITHUB_REF_NAME and downloaded checksums verified"
