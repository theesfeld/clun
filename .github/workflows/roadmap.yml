name: Roadmap Issue Reconciliation

# Deliberately manual: canonical issues must be reconciled before publishing
# repository claims, whose read-only workflows fail closed on any live drift.
on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: roadmap-issues
  cancel-in-progress: false

jobs:
  sync:
    name: Reconcile canonical issues
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master
      - name: Validate roadmap source
        run: sh scripts/roadmap.sh check
      - name: Reconcile milestone, labels, and issues
        env:
          GH_TOKEN: ${{ github.token }}
          ROADMAP_REPO: ${{ github.repository }}
        run: sh scripts/roadmap.sh sync
      - name: Verify canonical live roadmap issues
        env:
          GH_TOKEN: ${{ github.token }}
          ROADMAP_REPO: ${{ github.repository }}
        run: make roadmap-verify-live
