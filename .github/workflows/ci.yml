name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  issues: read

jobs:
  build-test-purity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify SemVer transition policy
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          GH_TOKEN: ${{ github.token }}
        run: |
          make test-version-transition-check
          make version-transition-check

      - name: Classify runtime changes
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          runtime=true
          if [[ -n "$BASE_SHA" ]] && git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            runtime=false
            git diff --no-renames --name-only "$BASE_SHA" "$GITHUB_SHA" > "$RUNNER_TEMP/changed-files"
            while IFS= read -r path; do
              case "$path" in
                docs/conformance/test262-execution.md|scripts/public-claims-check.sh) runtime=true; break ;;
                site/*|compat/*|AGENTS.md|README.md|PLAN.md|STATE.md|DECISIONS.md|docs/*|scripts/compat.sh|scripts/compat-validate.awk|scripts/compat-render.awk|scripts/test-compat-tools.sh|scripts/roadmap.sh|scripts/test-installer.sh|.github/workflows/ci.yml|.github/workflows/compat.yml|.github/workflows/docs.yml|.github/workflows/pages.yml) ;;
                *) runtime=true; break ;;
              esac
            done < "$RUNNER_TEMP/changed-files"
          fi
          echo "runtime=$runtime" >> "$GITHUB_OUTPUT"

      - name: Verify published claims and installer
        run: sh scripts/public-claims-check.sh

      - name: Test compatibility ledger tooling
        run: make test-compat-tools

      # Pin SBCL to the version the plan targets (PLAN.md host toolchain).
      - name: Install SBCL 2.6.4
        if: steps.scope.outputs.runtime == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zstd libzstd-dev curl bzip2 openssl
          curl --fail --location --retry 3 \
            --output "$RUNNER_TEMP/sbcl-binary.tar.bz2" \
            https://downloads.sourceforge.net/project/sbcl/sbcl/2.6.4/sbcl-2.6.4-x86-64-linux-binary.tar.bz2
          test "$(sha256sum "$RUNNER_TEMP/sbcl-binary.tar.bz2" | awk '{print $1}')" = \
            "466933f9b4f403b6a49b2a7cc755fdd5d827c3b354aa3c8c0d96697e5da1e9fc"
          tar -xjf "$RUNNER_TEMP/sbcl-binary.tar.bz2" -C "$RUNNER_TEMP"
          cd "$RUNNER_TEMP/sbcl-2.6.4-x86-64-linux"
          sudo bash install.sh
          sbcl --version

      - name: make build
        if: steps.scope.outputs.runtime == 'true'
        run: make build

      - name: clun --version
        if: steps.scope.outputs.runtime == 'true'
        run: |
          out="$(./build/clun --version)"
          expected="$(sed -n 's/^(defparameter \*clun-version\* "\([^"]*\)".*/\1/p' src/version.lisp)"
          echo "$out"
          test "$out" = "clun $expected"

      - name: make test (shared-runner performance gates excluded)
        if: steps.scope.outputs.runtime == 'true'
        env:
          CLUN_SKIP_PERFORMANCE_TESTS: "1"
        run: make test

      - name: make test-tls12 (security policy and OpenSSL interop)
        if: steps.scope.outputs.runtime == 'true'
        run: make test-tls12

      - name: Verify live test262 inventory matches published claims
        if: steps.scope.outputs.runtime == 'true'
        run: make conformance-buckets-verify

      - name: make purity
        if: steps.scope.outputs.runtime == 'true'
        run: make purity
